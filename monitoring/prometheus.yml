global:
  scrape_interval: 15s

scrape_configs:
  - job_name: app
    metrics_path: /api/metrics
    static_configs:
      - targets:
          - app:3001

  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter:9187